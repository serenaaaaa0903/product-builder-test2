<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리집 안전 보안관 - 다국어 지원 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #1b5e20;
            --accent: #d4af37;
            --bg: #eceff1;
            --white: #ffffff;
            --card-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            background-attachment: fixed;
            margin: 0; padding: 0;
            line-height: 1.6;
            color: #2c3e50;
        }

        #lang-bar {
            background: rgba(27, 94, 32, 0.9);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            text-align: right;
            display: flex;
            justify-content: flex-end; gap: 12px;
            position: sticky; top: 0; z-index: 100;
        }
        .lang-btn {
            background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: 0.3s;
        }
        .lang-btn.active { background: white; color: var(--primary); font-weight: bold; border-color: white; }
        .lang-btn:hover { background: rgba(255,255,255,0.25); }

        header {
            background: var(--primary);
            color: white; padding: 50px 20px;
            text-align: center;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: -30px;
        }
        header h1 { font-size: 2rem; margin: 0; letter-spacing: -0.5px; }
        header p { opacity: 0.8; font-size: 1rem; margin-top: 10px; }

        .container { max-width: 650px; margin: 0 auto; padding: 20px; position: relative; z-index: 10; }

        section { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 35px; border-radius: 24px; 
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .form-group { margin-bottom: 25px; }
        label { display: block; font-weight: 600; margin-bottom: 12px; color: #34495e; }
        input, textarea, select { 
            width: 100%; padding: 16px; border: 1.5px solid #e0e6ed; border-radius: 14px; 
            box-sizing: border-box; font-size: 1rem; transition: 0.3s; background: #f8fafc;
        }
        input:focus, textarea:focus, select:focus { border-color: var(--primary); outline: none; background: white; box-shadow: 0 0 0 4px rgba(27,94,32,0.1); }
        
        .btn-main { 
            width: 100%; padding: 20px; background: var(--primary); color: white; border: none; 
            border-radius: 16px; font-size: 1.2rem; font-weight: 700; cursor: pointer; 
            margin-top: 15px; transition: 0.3s; box-shadow: 0 4px 15px rgba(27,94,32,0.2);
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(27,94,32,0.3); }
        .btn-main:active { transform: translateY(0); }
        
        #edu-section { display: none; }
        .edu-card { 
            background: white; border-radius: 18px; padding: 25px; margin-bottom: 20px; 
            border: 1px solid #edf2f7; position: relative; border-left: 8px solid #cbd5e0; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .edu-card.done { border-left-color: var(--primary); background: #f0fdf4 !important; border-color: #bbf7d0; transform: scale(1.02); }
        
        .edu-date { font-size: 0.85rem; color: #718096; margin-bottom: 8px; font-weight: 500; }
        .edu-btn { 
            display: block; margin-top: 15px; padding: 14px; background: #4a5568; color: white; 
            text-align: center; text-decoration: none; border-radius: 12px; font-weight: 600; 
            border: none; width: 100%; cursor: pointer; transition: 0.3s;
        }
        .done .edu-btn { background: var(--primary); }

        #link-display { 
            display: none; margin-top: 25px; padding: 20px; background: #f0fdf4; 
            border: 2px dashed var(--primary); border-radius: 16px; text-align: center; 
        }

        #cert-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px;
            backdrop-filter: blur(8px);
        }
        #cert-content {
            background: white; width: 100%; max-width: 550px; padding: 50px; border: 12px double var(--accent);
            text-align: center; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: modalUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            background-image: radial-gradient(circle at 2px 2px, #f0f0f0 1px, transparent 0);
            background-size: 32px 32px;
        }
        @keyframes modalUp { from { transform: translateY(80px) scale(0.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
        
        .cert-title { font-size: 2.8rem; color: #b8860b; font-weight: 800; margin-bottom: 25px; letter-spacing: 4px; }
        .cert-name { font-size: 1.6rem; font-weight: 700; margin-bottom: 30px; border-bottom: 2px solid #b8860b; display: inline-block; padding: 0 30px; color: #1a202c; }
        .cert-body { font-size: 1.15rem; line-height: 1.9; margin-bottom: 35px; word-break: keep-all; color: #4a5568; padding: 0 10px; }
        .cert-msg { background: #fffaf0; padding: 20px; border-radius: 12px; border: 1px solid #feebc8; margin-bottom: 35px; font-style: italic; color: #744210; font-weight: 500; }
        .cert-footer { font-size: 1.3rem; font-weight: 800; color: #2d3748; }
        .cert-date { font-size: 1rem; color: #a0aec0; margin-top: 15px; font-weight: 500; }
        .btn-close { margin-top: 30px; padding: 12px 40px; background: #2d3748; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-close:hover { background: #1a202c; }

        .btn-tts {
            background: #edf2f7; color: #4a5568; border: 1px solid #e2e8f0; padding: 8px 14px; border-radius: 8px;
            font-size: 0.85rem; cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
            font-weight: 600; transition: 0.3s;
        }
        .btn-tts:hover { background: #e2e8f0; color: #2d3748; }
    </style>
</head>
<body>

<div id="lang-bar">
    <button id="btn-ko" class="lang-btn active" onclick="changeLang('ko')">한국어</button>
    <button id="btn-en" class="lang-btn" onclick="changeLang('en')">English</button>
    <button id="btn-ja" class="lang-btn" onclick="changeLang('ja')">日本語</button>
</div>

<header>
    <h1 id="txt-title">🛡️ 우리집 안전 보안관</h1>
    <p id="txt-subtitle">사랑하는 가족을 위한 맞춤 교육</p>
</header>

<div class="container">
    <section id="setup-section">
        <h2 id="txt-setup-h2">1. 교육 대상 설정</h2>
        <div class="form-group">
            <label id="txt-label-target">누구에게 보낼까요?</label>
            <select id="target_type">
                <option value="parent" id="txt-opt-parent">부모님께 (효도 보안관)</option>
                <option value="child" id="txt-opt-child">자녀에게 (청년 보안관)</option>
                <option value="spouse" id="txt-opt-spouse">배우자에게 (파트너 보안관)</option>
            </select>
        </div>
        <div class="form-group">
            <label id="txt-label-name">받는 분 성함</label>
            <input type="text" id="p_name" placeholder="성함을 입력하세요">
        </div>
        <div class="form-group">
            <label id="txt-label-msg">사랑의 메시지</label>
            <textarea id="p_msg" placeholder="사기 당하지 말고 행복하게 살자!"></textarea>
        </div>
        <button class="btn-main" id="txt-btn-generate" onclick="generateLink()">교육 링크 생성</button>

        <div id="link-display">
            <p id="txt-link-ready" style="font-weight:bold; color:var(--primary);">링크가 준비되었습니다!</p>
            <button class="btn-main" style="background:#fee500; color:#3c1e1e;" id="txt-btn-copy" onclick="copyUrl()">링크 복사 후 카톡 전송</button>
            <p id="final-url" style="font-size:0.75rem; color:#888; word-break:break-all; margin-top:10px;"></p>
        </div>
    </section>

    <section id="edu-section">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 id="txt-edu-welcome" style="color: var(--primary); margin-bottom: 10px;"></h2>
            <p id="txt-edu-desc" style="color: #4a5568; font-size: 1.05rem; word-break: keep-all;"></p>
            <div style="background:#e2e8f0; height:12px; border-radius:10px; overflow:hidden; margin:20px 0;">
                <div id="progress-fill" style="width:0%; height:100%; background:var(--primary); transition:0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);"></div>
            </div>
            <p id="txt-progress" style="font-weight: 700; color: var(--primary);"></p>
        </div>
        <div id="edu-list"></div>
        <button id="issue-btn" class="btn-main" style="display:none; background:var(--accent); color: #5d4037;" onclick="showFancyCert()">🏆 교육 이수 상장 확인</button>
    </section>
</div>

<div id="cert-modal">
    <div id="cert-content">
        <div class="cert-title" id="cert-ui-title">수 료 증</div>
        <div class="cert-name"><span id="cert-ui-name"></span> <span id="cert-ui-suffix"></span></div>
        <div class="cert-body" id="cert-ui-body"></div>
        <div class="cert-msg">" <span id="cert-ui-msg"></span> "</div>
        <div class="cert-footer" id="cert-ui-footer">우리집 안전 보안관 본부</div>
        <div class="cert-date" id="cert-ui-date">2026. 03. 29</div>
        <button class="btn-close" onclick="closeCert()">닫기</button>
    </div>
</div>

            ]

    };

    let currentLang = 'ko';

    function changeLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById(`btn-${lang}`);
        if(activeBtn) activeBtn.classList.add('active');

        const d = langData[lang];
        document.getElementById('txt-title').innerText = d.title;
        document.getElementById('txt-subtitle').innerText = d.subtitle;
        document.getElementById('txt-setup-h2').innerText = d.setupH2;
        document.getElementById('txt-label-target').innerText = d.labelTarget;
        document.getElementById('txt-opt-parent').innerText = d.optParent;
        document.getElementById('txt-opt-child').innerText = d.optChild;
        document.getElementById('txt-opt-spouse').innerText = d.optSpouse;
        document.getElementById('txt-label-name').innerText = d.labelName;
        document.getElementById('p_name').placeholder = d.placeholderName;
        document.getElementById('txt-label-msg').innerText = d.labelMsg;
        document.getElementById('p_msg').placeholder = d.placeholderMsg;
        document.getElementById('txt-btn-generate').innerText = d.btnGenerate;
        document.getElementById('txt-link-ready').innerText = d.linkReady;
        document.getElementById('txt-btn-copy').innerText = d.btnCopy;
        document.getElementById('txt-edu-desc').innerText = d.eduDesc;
        document.getElementById('issue-btn').innerText = d.issueBtn;

        const name = new URLSearchParams(window.location.search).get('name') || "";
        const welcomePrefix = name ? name : "";
        document.getElementById('txt-edu-welcome').innerText = welcomePrefix + d.eduWelcome;

        if(document.getElementById('edu-section').style.display === 'block') renderList();
    }

    function generateLink() {
        const target = document.getElementById('target_type').value;
        const name = document.getElementById('p_name').value;
        const msg = document.getElementById('p_msg').value;
        if(!name || !msg) return alert(currentLang === 'ko' ? "내용을 모두 입력해주세요." : "Fields are required.");
        const url = `${window.location.href.split('?')[0]}?lang=${currentLang}&target=${target}&name=${encodeURIComponent(name)}&msg=${encodeURIComponent(msg)}`;
        document.getElementById('final-url').innerText = url;
        document.getElementById('link-display').style.display = 'block';
    }

    function copyUrl() {
        navigator.clipboard.writeText(document.getElementById('final-url').innerText);
        alert(langData[currentLang].alertLink);
    }

    function renderList() {
        const list = document.getElementById('edu-list');
        list.innerHTML = '';
        const d = langData[currentLang];
        d.eduList.forEach((item) => {
            const isDone = localStorage.getItem(`done_${item.id}`);
            const div = document.createElement('div');
            div.className = `edu-card ${isDone ? 'done' : ''}`;
            if (item.content) { 
                div.innerHTML = `
                    <div class="edu-date">${item.date}</div>
                    <span style="font-weight:bold; display:block; margin-bottom:10px;">${item.title}</span>
                    <button class="btn-tts" onclick="speakText('${item.content.replace(/'/g, "\\'")}')">${d.readAloud}</button>
                    <p style="font-size:0.9rem; color:#444; background:#f9f9f9; padding:12px; border-radius:8px; border:1px solid #eee; margin-bottom:10px;">${item.content}</p>
                    <button class="edu-btn" onclick="done(${item.id})">${isDone ? d.trendConfirm : d.eduBtn}</button>`;
            } else { 
                div.innerHTML = `
                    <div class="edu-date">${item.date}</div>
                    <span style="font-weight:bold;">${item.title}</span>
                    <a href="${item.url}" target="_blank" class="edu-btn" onclick="done(${item.id})">${d.eduBtn}</a>`;
            }
            list.appendChild(div);
        });
        updateStatus();
    }

    function speakText(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = langData[currentLang].ttsLang;
        utterance.pitch = 1.1;
        utterance.rate = 0.95;
        window.speechSynthesis.speak(utterance);
    }

    function done(id) {
        localStorage.setItem(`done_${id}`, 'true');
        setTimeout(renderList, 1000);
    }

    function updateStatus() {
        let count = 0;
        const d = langData[currentLang];
        d.eduList.forEach(i => { if(localStorage.getItem(`done_${i.id}`)) count++; });
        const total = d.eduList.length;
        document.getElementById('progress-fill').style.width = (count/total*100) + '%';
        document.getElementById('txt-progress').innerText = `${d.progress}: ${count} / ${total}`;
        if(count >= total) document.getElementById('issue-btn').style.display = 'block';
    }

    function showFancyCert() {
        const params = new URLSearchParams(window.location.search);
        const d = langData[currentLang];
        document.getElementById('cert-ui-title').innerText = d.certTitle;
        document.getElementById('cert-ui-name').innerText = params.get('name') || "";
        document.getElementById('cert-ui-suffix').innerText = d.certSuffix;
        document.getElementById('cert-ui-body').innerText = d.certBody;
        document.getElementById('cert-ui-msg').innerText = params.get('msg') || "";
        document.getElementById('cert-ui-footer').innerText = d.certFooter;
        document.getElementById('cert-ui-date').innerText = new Date().toLocaleDateString();
        document.getElementById('cert-modal').style.display = 'flex';
    }

    function closeCert() { document.getElementById('cert-modal').style.display = 'none'; }

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        if(params.get('name')) {
            if (!sessionStorage.getItem('session_active')) {
                [1,2,3,4,5].forEach(id => localStorage.removeItem(`done_${id}`));
                sessionStorage.setItem('session_active', 'true');
            }
            changeLang(params.get('lang') || 'ko');
            document.getElementById('setup-section').style.display = 'none';
            document.getElementById('edu-section').style.display = 'block';
            renderList();
        }
    };
</script>
</body>
</html>
